{% extends 'tapasapp/base.html' %}
{% load static %}

{% block content %}
<div class="col-md-8">

    <div class="card">
        <div class="card-header">
            <h5 class="card-title">Change Password</h5>
        </div>
        <div class="card-body">

            <form method="POST" action="{% url 'change_password' pk=pk %}">{% csrf_token %}
                    
                <div class="form-group">
                    <label for="name"> Enter Current Password </label>
                    <input type="text" class="form-control" id="dname" name="currentPassword">
                </div>

                <div class="form-group">
                    <label for="name"> Enter New Password </label>
                    <input type="text" class="form-control" id="dname" name="newPassword">
                </div>

                <div class="form-group">
                    <label for="name"> Reenter New Password </label>
                    <input type="text" class="form-control" id="dname" name="newPasswordAgain">
                </div>

                <button type="submit" class="mt-3 btn btn-success">Confirm</button>
                <a href="{% url 'manage_account' pk=pk %}" class="mt-3 btn btn-dark">Cancel</a>
            </form>                

        </div>
    </div>

</div>

{% if messages %}
    {% for message in messages %}
        <h1>{{ message }}</h1>
    {% endfor %}
{% endif %}
{% endblock %}
